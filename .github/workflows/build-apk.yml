name: Build Phyphox Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.0
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew assembleRegularRelease assembleRegularDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: phyphox-apk
          path: "**/build/outputs/apk/**/*.apk"
